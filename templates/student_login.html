<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b, #2563eb);
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 22px;
      padding: 35px 30px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
      color: white;
      text-align: center;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      color: white;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .logo-text::after {
      content: "";
      display: block;
      width: 45px;
      height: 3px;
      background: #3b82f6;
      margin: 8px auto 0;
      border-radius: 10px;
    }

    h2 {
      font-size: 34px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .subtitle {
      font-size: 15px;
      color: #d1d5db;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .input-group {
      text-align: left;
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #e5e7eb;
    }

    .input-group input {
      width: 100%;
      padding: 14px 15px;
      border: none;
      outline: none;
      border-radius: 12px;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.14);
      color: white;
      transition: 0.3s ease;
    }

    .input-group input::placeholder {
      color: #cbd5e1;
    }

    .input-group input:focus {
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.35);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
      margin-top: 8px;
    }

    .login-btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    .error {
      margin-top: 15px;
      color: #fca5a5;
      font-size: 14px;
      font-weight: 500;
    }

    .footer-text {
      margin-top: 18px;
      font-size: 12px;
      color: #cbd5e1;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 28px 20px;
      }

      h2 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-text">JIMS</div>

    <h2>Student Login</h2>
    <p class="subtitle">Sign in to view your personal result dashboard and performance insights</p>

    <form action="/student-login" method="POST">
      <div class="input-group">
        <label for="student_id">Student ID</label>
        <input
          type="text"
          id="student_id"
          name="student_id"
          placeholder="Enter Student ID"
          required
        />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter Password"
          required
        />
      </div>

      <button type="submit" class="login-btn">Login as Student</button>
    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <div class="footer-text">Result Analysis & Performance Dashboard</div>
  </div>
</body>
</html>
